name: Prevent scheduled workflow from being automatically disabled

on:
  schedule:
    - cron: '45 14 12,27 * *'
  workflow_dispatch:

concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    permissions:
      actions: write
    runs-on: ubuntu-latest
    steps:
      - name: Re-enable workflow
        env:
          GH_TOKEN: ${{ secrets.ACTION_KEEP_ALIVE_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh workflow enable keepalive.yaml
          gh workflow enable publish_data.yaml
